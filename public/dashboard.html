<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORAGE — Tableau de bord casting</title>
<style>
  :root {
    --dark: #0d1b2a; --dark2: #0a1420; --green: #1a6b3c; --green-light: #2f9a5b;
    --gray: #8a94a3; --line: rgba(255,255,255,0.12); --card: #12233a;
    --oui: #2f9a5b; --peutetre: #b39a3a; --non: #b3564a; --archive-c: #6b6f76; --confirme: #8b5cf6;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(160deg, var(--dark), var(--dark2)); color: #f4f6f8; min-height: 100vh; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 24px 80px; }
  h1 { font-size: 32px; margin: 0 0 4px; letter-spacing: 1px; }
  .sub { color: var(--gray); font-size: 13px; margin-bottom: 32px; }

  #gate { max-width: 360px; margin: 120px auto; text-align: center; }
  #gate input { width: 100%; padding: 12px 14px; border-radius: 6px; border: 1px solid var(--line); background: #0d1826; color: #fff; font-size: 14px; margin-bottom: 12px; }
  #gate button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: var(--green); color: #fff; font-weight: 700; cursor: pointer; }
  #gate button:hover { background: var(--green-light); }
  #gate .err { color: #e07a6b; font-size: 13px; margin-top: 10px; min-height: 18px; }

  #dashboard { display: none; }
  .stats { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 20px; min-width: 110px; }
  .stat .num { font-size: 24px; font-weight: 800; }
  .stat .label { color: var(--gray); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  .role-group { margin-bottom: 30px; }
  .role-group h2 { font-size: 16px; color: var(--green-light); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 12px; }
  .role-group-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 12px; }
  .role-group-header h2 { border: none; padding: 0; margin: 0; }
  .role-closed-badge { background: var(--non); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; letter-spacing: 0.5px; margin-left: 8px; }
  .role-toggle-btn { background: var(--card); border: 1px solid var(--line); color: var(--gray); padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .role-toggle-btn:hover { color: #fff; border-color: var(--green-light); }
  .sub-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px 18px; margin-bottom: 10px; display: grid; grid-template-columns: 56px 1.8fr auto auto auto; gap: 14px; align-items: center; font-size: 13px; }
  .sub-details { grid-column: 1 / -1; display: none; padding-top: 10px; margin-top: 8px; border-top: 1px dashed var(--line); }
  .sub-details.open { display: block; }
  .details-toggle-btn { background: transparent; border: 1px solid var(--line); color: var(--gray); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .details-toggle-btn:hover { color: #fff; border-color: var(--green-light); }
  .sub-note-label { display: block; color: var(--gray); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .sub-details .sub-links { display: flex; gap: 14px; margin-bottom: 8px; }
  .sub-details .sub-note { margin-bottom: 8px; }
  .sub-details .edit-toggle-btn { margin-bottom: 4px; }
  .sub-card.is-archived { opacity: 0.6; }
  .sub-photo { width: 56px; height: 74px; object-fit: cover; border-radius: 6px; background: #0d1826; border: 1px solid var(--line); box-shadow: 0 2px 8px rgba(0,0,0,0.35); }
  .sub-photo.no-photo { display: flex; align-items: center; justify-content: center; text-align: center; font-size: 10px; color: var(--gray); padding: 4px; line-height: 1.3; }
  .sub-name { font-weight: 700; font-size: 15px; }
  .sub-name span { display: block; color: var(--gray); font-weight: 400; font-size: 11px; margin-top: 2px; }
  .sub-links a { color: var(--green-light); text-decoration: none; display: block; font-size: 12px; }
  .sub-links a:hover { text-decoration: underline; }
  .sub-note { color: #c9d0d8; font-size: 12.5px; }
  select { background: #0d1826; color: #fff; border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font-size: 12px; }
  select.oui { border-color: var(--oui); }
  select.peutetre { border-color: var(--peutetre); }
  select.non { border-color: var(--non); }
  select.confirme { border-color: var(--confirme); }
  .archive-btn { background: transparent; border: 1px solid var(--line); color: var(--gray); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .archive-btn:hover { color: #fff; border-color: var(--archive-c); }
  .edit-toggle-btn { background: transparent; border: 1px solid var(--line); color: var(--gray); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .edit-toggle-btn:hover { color: #fff; border-color: var(--green-light); }
  .codes-add-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .role-manage-item { background: #0d1826; border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .role-manage-item .rm-row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .role-manage-item .rm-name { font-weight: 700; flex: 1; }
  .role-manage-item .rm-badge { font-size: 10px; background: var(--non); color: #fff; padding: 2px 8px; border-radius: 10px; }
  .role-manage-item .rm-toggle { background: transparent; border: 1px solid var(--line); color: var(--gray); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .role-manage-item .rm-edit-toggle { background: transparent; border: 1px solid var(--line); color: var(--gray); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .role-manage-item .rm-delete { background: transparent; border: 1px solid var(--non); color: var(--non); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .role-manage-item .rm-edit-row { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .role-manage-item .rm-edit-row.open { display: grid; }
  .role-manage-item .rm-edit-row .full { grid-column: 1 / -1; }
  .role-manage-item .rm-edit-row label { font-size: 10px; color: var(--gray); text-transform: uppercase; margin-bottom: 3px; display: block; }
  .role-manage-item .rm-edit-row input, .role-manage-item .rm-edit-row textarea {
    width: 100%; background: #0a1420; border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px; color: #fff; font-size: 12.5px; font-family: inherit;
  }
  .role-manage-item .rm-edit-row textarea { min-height: 50px; resize: vertical; }
  .role-manage-item .rm-save { background: var(--oui); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .vimeo-input { background: #0d1826; color: #fff; border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font-size: 12px; width: 100%; }
  .vimeo-input:focus { outline: none; border-color: var(--oui); }
  .vimeo-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; margin-top: 6px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .vimeo-row label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .vimeo-save { background: var(--oui); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .vimeo-save:hover { opacity: 0.85; }
  .vimeo-saved-msg { font-size: 11px; color: var(--oui); white-space: nowrap; }
  .photo-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .photo-row label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .photo-row input[type="file"] { font-size: 11px; color: var(--gray); max-width: 200px; }
  .photo-save { background: var(--green); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .photo-save:hover { opacity: 0.85; }
  .photo-saved-msg { font-size: 11px; color: var(--oui); white-space: nowrap; }
  .comments-row { grid-column: 1 / -1; margin-top: 6px; }
  .comments-row .label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .comment-item { font-size: 12.5px; color: #d7dde3; padding-left: 8px; border-left: 2px solid var(--peutetre); margin-bottom: 4px; }
  .comment-item .meta { color: var(--gray); font-size: 10.5px; }
  .scene-btn { background: transparent; border: 1px solid var(--peutetre); color: var(--peutetre); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .scene-btn:hover { background: var(--peutetre); color: #fff; }
  .scene-sent { font-size: 11px; color: var(--oui); white-space: nowrap; margin-left: 6px; }
  .scene-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; margin-top: 6px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .scene-row label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .empty { color: var(--gray); font-size: 13px; padding: 20px 0; }
  .refresh { background: var(--card); border: 1px solid var(--line); color: var(--gray); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 20px; }
  .refresh:hover { color: #fff; }
  .load-more-btn { display: block; width: 100%; background: var(--card); border: 1px dashed var(--line); color: var(--gray); padding: 12px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 6px; }
  .load-more-btn:hover { color: #fff; border-color: var(--green-light); }
  .add-profile-panel { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .add-profile-panel h3 { margin: 0 0 16px; font-size: 16px; color: var(--oui); }
  .add-profile-panel form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .add-profile-panel .full { grid-column: 1 / -1; }
  .add-profile-panel label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
  .add-profile-panel input, .add-profile-panel select, .add-profile-panel textarea {
    width: 100%; background: #0d1826; border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 10px; color: #fff; font-family: inherit; font-size: 13px;
  }
  .add-profile-panel textarea { min-height: 50px; resize: vertical; }
  .add-profile-actions { display: flex; align-items: center; gap: 10px; }
  .add-profile-actions button[type="submit"] { background: var(--oui); border: none; color: #fff; padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .add-profile-actions button[type="button"] { background: transparent; border: 1px solid var(--line); color: var(--gray); padding: 9px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .add-profile-msg { font-size: 12px; color: var(--gray); }
  .auto-photo-row { display: flex; gap: 12px; align-items: flex-start; grid-column: 1 / -1; }
  .auto-photo-preview { width: 60px; height: 80px; border-radius: 6px; background: #0d1826; border: 1px solid var(--line); flex-shrink: 0; overflow: hidden; }
  .auto-photo-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .auto-photo-info { flex: 1; }
  .auto-photo-status { font-size: 12px; color: var(--gray); margin-bottom: 6px; min-height: 16px; }
  .auto-photo-status.ok { color: var(--oui); }
  .auto-photo-status.err { color: var(--non); }
  .edit-row { grid-column: 1 / -1; margin-top: 6px; padding-top: 10px; border-top: 1px dashed var(--line); display: none; }
  .edit-row.open { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .edit-row .full { grid-column: 1 / -1; }
  .edit-row label { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
  .edit-row input, .edit-row textarea {
    width: 100%; background: #0d1826; border: 1px solid var(--line); border-radius: 6px;
    padding: 7px 9px; color: #fff; font-family: inherit; font-size: 12.5px;
  }
  .edit-row textarea { min-height: 40px; resize: vertical; }
  .edit-actions { display: flex; align-items: center; gap: 8px; }
  .edit-save-btn { background: var(--oui); border: none; color: #fff; padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .edit-cancel-btn { background: transparent; border: 1px solid var(--line); color: var(--gray); padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .edit-msg { font-size: 11px; color: var(--oui); }

  #archive-section { margin-top: 50px; border-top: 1px solid var(--line); padding-top: 24px; }
  #archive-toggle { background: none; border: none; color: var(--gray); font-size: 14px; cursor: pointer; padding: 0; margin-bottom: 16px; }
  #archive-toggle:hover { color: #fff; }
  #archive-list { display: none; }
  #archive-list.open { display: block; }
  .restore-btn { background: var(--oui); border: none; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .delete-btn { background: transparent; border: 1px solid var(--non); color: var(--non); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .delete-btn:hover { background: var(--non); color: #fff; }
  .archive-actions { display: flex; gap: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <div id="gate">
      <h1>ORAGE</h1>
      <div class="sub">Tableau de bord — accès privé</div>
      <input type="password" id="pw" placeholder="Mot de passe">
      <button id="enter">Accéder au tableau de bord</button>
      <div class="err" id="gate-err"></div>
    </div>

    <div id="dashboard">
      <h1>ORAGE — Tableau de bord</h1>
      <div class="sub">Candidatures reçues des agences</div>
      <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
        <button class="refresh" id="refresh">↻ Actualiser</button>
        <button class="refresh" id="export-oui" style="border-color:var(--oui);color:var(--oui);">⬇ Exporter les « Oui » (PDF)</button>
        <button class="refresh" id="export-peutetre" style="border-color:var(--peutetre);color:var(--peutetre);">⬇ Exporter les « Peut-être » (PDF)</button>
        <button class="refresh" id="open-client" style="border-color:var(--green-light);color:var(--green-light);">↗ Ouvrir la page client</button>
        <button class="refresh" id="toggle-add-form" style="border-color:var(--oui);color:var(--oui);">+ Ajouter un profil</button>
        <button class="refresh" id="toggle-roles-panel" style="border-color:var(--confirme);color:var(--confirme);">🎭 Gérer les rôles</button>
      </div>

      <div id="roles-panel" class="add-profile-panel" style="display:none;">
        <h3>Gérer les rôles</h3>
        <form id="create-role-form" style="margin-bottom:20px; padding-bottom:20px; border-bottom:1px dashed var(--line);">
          <div>
            <label>Nom du rôle *</label>
            <input type="text" name="name" required placeholder="ex: NOUVEAU PERSONNAGE">
          </div>
          <div>
            <label>Âge</label>
            <input type="text" name="age" placeholder="ex: 30-40 ans">
          </div>
          <div>
            <label>Type / job</label>
            <input type="text" name="job" placeholder="ex: Rôle important">
          </div>
          <div class="full">
            <label>Description</label>
            <textarea name="desc" placeholder="Brief du personnage..."></textarea>
          </div>
          <div class="full add-profile-actions">
            <button type="submit">Créer le rôle</button>
            <span class="add-profile-msg" id="create-role-msg"></span>
          </div>
        </form>
        <div id="roles-list"></div>
      </div>

      <div id="add-profile-panel" class="add-profile-panel" style="display:none;">
        <h3>Ajouter un profil</h3>
        <form id="add-profile-form">
          <div>
            <label>Rôle *</label>
            <select name="role" id="add-role-select"></select>
            <input type="text" name="customRole" id="add-role-custom" placeholder="Nom du personnage" style="display:none; margin-top:8px;">
          </div>
          <div>
            <label>Nom du comédien *</label>
            <input type="text" name="name" required>
          </div>
          <div>
            <label>Agence</label>
            <input type="text" name="agency">
          </div>
          <div>
            <label>Email de contact</label>
            <input type="email" name="email">
          </div>
          <div>
            <label>Deuxième email de contact</label>
            <input type="email" name="email2">
          </div>
          <div>
            <label>Lien CV / fiche</label>
            <input type="text" name="cv">
          </div>
          <div>
            <label>Lien showreel</label>
            <input type="text" name="showreel">
          </div>
          <div>
            <label>Disponibilités</label>
            <input type="text" name="availability">
          </div>
          <div class="full">
            <label>Photo (JPG ou PNG, optionnel — recherchée automatiquement depuis le lien CV / fiche)</label>
            <div class="auto-photo-row">
              <div class="auto-photo-preview" id="add-photo-preview"></div>
              <div class="auto-photo-info">
                <div class="auto-photo-status" id="add-photo-status"></div>
                <input type="file" name="photo" accept="image/jpeg,image/png,image/jpg">
              </div>
            </div>
          </div>
          <div class="full">
            <label>Note</label>
            <textarea name="note"></textarea>
          </div>
          <div class="full add-profile-actions">
            <button type="submit">Ajouter</button>
            <button type="button" id="cancel-add-profile">Annuler</button>
            <span class="add-profile-msg"></span>
          </div>
        </form>
      </div>

      <div class="stats" id="stats"></div>
      <div id="groups"></div>

      <div id="archive-section">
        <button id="archive-toggle">▸ Profils archivés (<span id="archive-count">0</span>)</button>
        <div id="archive-list"></div>
      </div>
    </div>
  </div>

<script>
let ROLES = [];
let ROLES_ORDER = [];
const STATUS_ORDER = ["confirme", "oui", "peutetre", "non"];
let PASSWORD = "";

function normalizeStatus(status) {
  if (status === "confirme") return "confirme";
  if (["oui", "shortlist", "validated"].includes(status)) return "oui";
  if (["non", "rejected"].includes(status)) return "non";
  return "peutetre";
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

async function resizeImage(file, maxDim, quality) {
  maxDim = maxDim || 500;
  quality = quality || 0.75;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        if (!img.naturalWidth || !img.naturalHeight) {
          reject(new Error("Image non décodable"));
          return;
        }
        let width = img.width, height = img.height;
        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Image invalide"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Lecture du fichier impossible"));
    reader.readAsDataURL(file);
  });
}

document.getElementById("enter").addEventListener("click", tryEnter);
document.getElementById("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") tryEnter(); });
document.getElementById("refresh").addEventListener("click", loadData);
document.getElementById("export-oui").addEventListener("click", () => exportDocx("oui"));
document.getElementById("export-peutetre").addEventListener("click", () => exportDocx("peutetre"));
document.getElementById("open-client").addEventListener("click", () => window.open("/client", "_blank"));
document.getElementById("archive-toggle").addEventListener("click", () => {
  const list = document.getElementById("archive-list");
  list.classList.toggle("open");
  document.getElementById("archive-toggle").textContent =
    (list.classList.contains("open") ? "▾" : "▸") + " Profils archivés (" + document.getElementById("archive-count").textContent + ")";
});

document.getElementById("toggle-roles-panel").addEventListener("click", () => {
  const panel = document.getElementById("roles-panel");
  const opening = panel.style.display === "none";
  panel.style.display = opening ? "block" : "none";
  if (opening) renderRolesList();
});

function renderRolesList() {
  const listEl = document.getElementById("roles-list");
  listEl.innerHTML = "";
  if (ROLES.length === 0) {
    listEl.innerHTML = '<div class="empty">Aucun rôle créé pour le moment.</div>';
    return;
  }
  ROLES.forEach(role => {
    const item = document.createElement("div");
    item.className = "role-manage-item";
    item.innerHTML =
      '<div class="rm-row1">' +
        '<span class="rm-name">' + escapeHtml(role.name) + '</span>' +
        (role.closed ? '<span class="rm-badge">FERMÉ</span>' : '') +
        '<button class="rm-toggle">' + (role.closed ? "Rouvrir" : "Fermer") + '</button>' +
        '<button class="rm-edit-toggle">Modifier</button>' +
        '<button class="rm-delete">Supprimer</button>' +
      '</div>' +
      '<div class="rm-edit-row">' +

async function exportDocx(status) {
  try {
    const res = await fetch("/api/export?status=" + status, {
      headers: { "x-dashboard-password": PASSWORD }
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      alert("Erreur export : " + (body.error || res.status));
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "ORAGE_" + status + "_" + new Date().toISOString().slice(0, 10) + ".pdf";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch {
    alert("Erreur lors de l'export.");
  }
}

      if (res.status === 401) {
        errEl.textContent = "Mot de passe incorrect.";

  });

  const photoPlaceholder = card.querySelector(".sub-photo[data-photo-id]");
  if (photoPlaceholder) loadPhotoInto(photoPlaceholder, s.id, s.name);

  return card;
}

const PAGE_SIZE = 30;

function renderPaginated(group, items, role) {
  const listEl = document.createElement("div");
  group.appendChild(listEl);
  let shown = 0;

  const moreBtn = document.createElement("button");
  moreBtn.className = "load-more-btn";

  function renderNextBatch() {
    const batch = items.slice(shown, shown + PAGE_SIZE);
    batch.forEach(s => listEl.appendChild(buildCard(s)));
    shown += batch.length;
    if (shown < items.length) {
      moreBtn.textContent = "Charger plus (" + (items.length - shown) + " restants)";
      if (!moreBtn.isConnected) group.appendChild(moreBtn);
    } else if (moreBtn.isConnected) {
      moreBtn.remove();
    }
  }

  moreBtn.addEventListener("click", renderNextBatch);
  renderNextBatch();
}

function render(data) {
  const all = data.submissions || [];
  const active = all.filter(s => !s.archived);
  const archived = all.filter(s => s.archived);

  const statsEl = document.getElementById("stats");
  const counts = { confirme: 0, oui: 0, peutetre: 0, non: 0 };
  active.forEach(s => { counts[normalizeStatus(s.status)]++; });
  statsEl.innerHTML =
    '<div class="stat"><div class="num">' + active.length + '</div><div class="label">Total actifs</div></div>' +
    '<div class="stat"><div class="num">' + counts.confirme + '</div><div class="label">Confirmé</div></div>' +
    '<div class="stat"><div class="num">' + counts.oui + '</div><div class="label">Oui</div></div>' +
    '<div class="stat"><div class="num">' + counts.peutetre + '</div><div class="label">Peut-être</div></div>' +
    '<div class="stat"><div class="num">' + counts.non + '</div><div class="label">Non</div></div>';

  const groupsEl = document.getElementById("groups");
  groupsEl.innerHTML = "";

  ROLES.forEach(roleObj => {
    const role = roleObj.name;
    const items = active
      .filter(s => s.role === role)
      .sort((a, b) => {
        const orderDiff = STATUS_ORDER.indexOf(normalizeStatus(a.status)) - STATUS_ORDER.indexOf(normalizeStatus(b.status));
        if (orderDiff !== 0) return orderDiff;
        return new Date(b.submittedAt) - new Date(a.submittedAt);
      });
    const isClosed = !!roleObj.closed;
    const group = document.createElement("div");
    group.className = "role-group";
    const header = document.createElement("div");
    header.className = "role-group-header";
    header.innerHTML =
      "<h2>" + role + " (" + items.length + ")" + (isClosed ? ' <span class="role-closed-badge">FERMÉ</span>' : "") + "</h2>" +
      '<button class="role-toggle-btn">' + (isClosed ? "Rouvrir ce rôle" : "Fermer ce rôle") + "</button>";
    header.querySelector(".role-toggle-btn").addEventListener("click", async () => {
      await toggleRole(roleObj.id, !isClosed);
      loadData();
    });
    group.appendChild(header);

    if (items.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Aucune candidature reçue.";
      group.appendChild(empty);
    } else {
      renderPaginated(group, items, role);
    }
    groupsEl.appendChild(group);
  });

  const customRoles = [...new Set(active.filter(s => !ROLES_ORDER.includes(s.role)).map(s => s.role))];
  customRoles.forEach(role => {
    const items = active
      .filter(s => s.role === role)
      .sort((a, b) => {
        const orderDiff = STATUS_ORDER.indexOf(normalizeStatus(a.status)) - STATUS_ORDER.indexOf(normalizeStatus(b.status));
        if (orderDiff !== 0) return orderDiff;
        return new Date(b.submittedAt) - new Date(a.submittedAt);
      });
    const group = document.createElement("div");
    group.className = "role-group";
    const header = document.createElement("div");
    header.className = "role-group-header";
    header.innerHTML = "<h2>" + role + " (" + items.length + ") <span style=\"color:var(--gray); font-weight:400; font-size:11px; text-transform:none;\">— hors casting</span></h2>";
    group.appendChild(header);
    renderPaginated(group, items, role);
    groupsEl.appendChild(group);
  });

  document.getElementById("archive-count").textContent = archived.length;
  const archiveListEl = document.getElementById("archive-list");
  archiveListEl.innerHTML = "";
  if (archived.length === 0) {
    archiveListEl.innerHTML = '<div class="empty">Aucun profil archivé.</div>';
  } else {
    archived
      .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt))
      .forEach(s => archiveListEl.appendChild(buildCard(s, { archived: true })));
  }
}
</script>
</body>
</html>
