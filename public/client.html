<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORAGE — Proposition de casting</title>
<style>
  :root {
    --dark: #0d1b2a; --dark2: #0a1420; --green: #1a6b3c; --green-light: #2f9a5b;
    --gray: #8a94a3; --line: rgba(255,255,255,0.12); --card: #12233a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(160deg, var(--dark), var(--dark2)); color: #f4f6f8; min-height: 100vh; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 56px 24px 80px; }
  h1 { text-align: center; font-size: 46px; margin: 0 0 6px; letter-spacing: 1px; font-weight: 800; }
  .confirmed-section { margin-bottom: 40px; }
  .confirmed-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
  .confirmed-group-label { text-align: center; color: var(--gray); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
  .confirmed-card { text-align: center; width: 130px; }
  .confirmed-photo { width: 130px; height: 172px; object-fit: cover; border-radius: 10px; background: var(--card); border: 1px solid var(--line); box-shadow: 0 6px 18px rgba(0,0,0,0.4); display: block; margin-bottom: 8px; }
  .confirmed-name { font-size: 14px; font-weight: 800; }
  .confirmed-role { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .role-group { background: var(--card); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 22px; overflow: hidden; }
  .role-head { display: flex; align-items: baseline; gap: 14px; padding: 20px 24px; cursor: pointer; user-select: none; }
  .role-name { font-size: 18px; font-weight: 800; flex: 1; color: var(--green-light); text-transform: uppercase; letter-spacing: 1px; }
  .role-count { color: var(--gray); font-size: 13px; }
  .chevron { color: var(--gray); transition: transform 0.2s ease; }
  .role-group.open .chevron { transform: rotate(180deg); }
  .role-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .role-group.open .role-body { max-height: 4000px; }
  .role-inner { padding: 0 24px 22px; }
  .candidate {
    background: #0d1826; border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; margin-bottom: 16px; display: grid; grid-template-columns: 140px 1fr; gap: 22px;
  }
  .candidate:last-child { margin-bottom: 0; }
  .candidate-photo { width: 140px; height: 186px; object-fit: cover; border-radius: 8px; background: #0a1420; box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
  .candidate-name { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
  .candidate-agency { color: var(--gray); font-size: 13px; margin-bottom: 12px; }
  .candidate-links { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .candidate-links a {
    color: var(--green-light); text-decoration: none; font-size: 13px; font-weight: 700;
    border: 1px solid var(--green); border-radius: 6px; padding: 6px 12px;
  }
  .candidate-links a:hover { background: var(--green); color: #fff; }
  .comments { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 12px; }
  .comment { font-size: 13px; color: #d7dde3; margin-bottom: 8px; padding-left: 10px; border-left: 2px solid var(--green); }
  .comment .meta { color: var(--gray); font-size: 11px; margin-top: 2px; }
  .comment-form { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .comment-form input[type="text"].author { width: 140px; }
  .comment-form input, .comment-form textarea {
    background: #0d1826; border: 1px solid var(--line); border-radius: 6px; color: #fff;
    padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .comment-form textarea { flex: 1; min-width: 200px; resize: vertical; min-height: 38px; }
  .comment-form button {
    background: var(--green); border: none; color: #fff; padding: 8px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .comment-form button:hover { background: var(--green-light); }
  .comment-msg { font-size: 12px; color: var(--green-light); margin-top: 6px; }
  .empty { text-align: center; color: var(--gray); padding: 60px 0; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ORAGE</h1>
    <div style="display:flex; align-items:center; justify-content:center; gap:48px; margin-bottom:28px; flex-wrap:wrap;">
      <img src="nicolas-logo.png" alt="Casting Nicolas Derouet" style="height:80px; opacity:0.9;">
      <img src="elephant-logo.png" alt="Elephant" style="height:22px; opacity:0.9;">
    </div>
    <img src="header.jpg" alt="ORAGE" style="width:100%;border-radius:12px;margin-bottom:40px;display:block;">
    <div id="content"><div class="empty">Chargement...</div></div>
  </div>

<script>
let ROLES_ORDER = [];

async function load() {
  const content = document.getElementById("content");
  try {
    const [rolesRes, viewRes] = await Promise.all([
      fetch("/api/roles-status", { cache: "no-store" }),
      fetch("/api/client-view?t=" + Date.now(), { cache: "no-store" })
    ]);
    if (rolesRes.ok) {
      const rolesData = await rolesRes.json();
      ROLES_ORDER = (rolesData.roles || []).map(r => r.name);
    }
    if (!viewRes.ok) {
      let detail = "";
      try { const body = await viewRes.json(); detail = body.error || body.detail || ""; } catch {}
      content.innerHTML = '<div class="empty">Erreur de chargement (' + viewRes.status + ')' + (detail ? " : " + detail : "") + '</div>';
      return;
    }
    const data = await viewRes.json();
    render(data.submissions || [], data.confirmed || []);
  } catch (err) {
    content.innerHTML = '<div class="empty">Erreur de chargement : ' + (err && err.message ? err.message : "inconnue") + '</div>';
  }
}

function firstName(fullName) {
  return (fullName || "").trim().split(/\s+/)[0] || "";
}

function buildConfirmedSection(confirmed) {
  const section = document.createElement("div");
  section.className = "confirmed-section";
  const items = [...confirmed].sort((a, b) => {
    const oa = (a.displayOrder !== undefined && a.displayOrder !== null) ? a.displayOrder : null;
    const ob = (b.displayOrder !== undefined && b.displayOrder !== null) ? b.displayOrder : null;
    if (oa !== null && ob !== null) return oa - ob;
    if (oa !== null) return -1;
    if (ob !== null) return 1;
    return firstName(a.name).localeCompare(firstName(b.name), "fr", { sensitivity: "base" });
  });

  const groups = [];
  const groupMap = new Map();
  items.forEach(s => {
    const label = s.displayGroup && s.displayGroup.trim() ? s.displayGroup.trim() : null;
    const key = label || ("__solo__" + s.id);
    if (!groupMap.has(key)) {
      const g = { label, items: [] };
      groupMap.set(key, g);
      groups.push(g);
    }
    groupMap.get(key).items.push(s);
  });

  groups.forEach(g => {
    if (g.label) {
      const labelEl = document.createElement("div");
      labelEl.className = "confirmed-group-label";
      labelEl.textContent = g.label;
      section.appendChild(labelEl);
    }
    const grid = document.createElement("div");
    grid.className = "confirmed-grid";
    g.items.forEach(s => {
      const card = document.createElement("div");
      card.className = "confirmed-card";
      card.innerHTML =
        '<div class="confirmed-photo" data-photo-id="' + s.id + '"></div>' +
        '<div class="confirmed-name">' + escapeHtml(s.name) + '</div>' +
        '<div class="confirmed-role">' + escapeHtml(s.role) + '</div>';
      grid.appendChild(card);
      const ph = card.querySelector(".confirmed-photo");
      loadPhotoIntoConfirmed(ph, s.id, s.name);
    });
    section.appendChild(grid);
  });

  return section;
}

async function loadPhotoIntoConfirmed(placeholderEl, id, name) {
  try {
    const res = await fetch("/api/client-photo?id=" + encodeURIComponent(id), { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    if (data.photo) {
      const img = document.createElement("img");
      img.className = "confirmed-photo";
      img.src = data.photo;
      img.alt = name;
      placeholderEl.replaceWith(img);
    }
  } catch {
    // silently skip
  }
}

function render(all, confirmed) {
  confirmed = confirmed || [];
  const confirmedTop = confirmed.filter(c => ROLES_ORDER.includes(c.role));
  const confirmedOther = confirmed.filter(c => !ROLES_ORDER.includes(c.role));
  const content = document.getElementById("content");
  content.innerHTML = "";

  if (confirmedTop.length > 0) {
    content.appendChild(buildConfirmedSection(confirmedTop));
  }

  if (all.length === 0 && confirmed.length === 0) {
    content.innerHTML = '<div class="empty">Aucune proposition disponible pour le moment.</div>';
    return;
  }
  ROLES_ORDER.forEach(role => {
    const items = all
      .filter(s => s.role === role)
      .sort((a, b) => firstName(a.name).localeCompare(firstName(b.name), "fr", { sensitivity: "base" }));
    if (items.length === 0) return;

    const group = document.createElement("div");
    group.className = "role-group";
    const head = document.createElement("div");
    head.className = "role-head";
    head.innerHTML =
      '<span class="role-name">' + role + '</span>' +
      '<span class="chevron">▾</span>';
    head.addEventListener("click", () => group.classList.toggle("open"));
    group.appendChild(head);

    const body = document.createElement("div");
    body.className = "role-body";
    const inner = document.createElement("div");
    inner.className = "role-inner";
    items.forEach(s => inner.appendChild(buildCandidate(s)));
    body.appendChild(inner);
    group.appendChild(body);

    content.appendChild(group);
  });

  if (confirmedOther.length > 0) {
    const otherTitle = document.createElement("h2");
    otherTitle.textContent = "Distribution complémentaire";
    otherTitle.style.cssText = "font-size:15px; color:var(--green-light); text-transform:uppercase; letter-spacing:1.5px; border-bottom:1px solid var(--line); padding-bottom:10px; margin:20px 0 16px;";
    content.appendChild(otherTitle);
    content.appendChild(buildConfirmedSection(confirmedOther));
  }
}

async function loadPhotoInto(placeholderEl, id, name) {
  try {
    const res = await fetch("/api/client-photo?id=" + encodeURIComponent(id), { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    if (data.photo) {
      const img = document.createElement("img");
      img.className = "candidate-photo";
      img.src = data.photo;
      img.alt = name;
      placeholderEl.replaceWith(img);
    }
  } catch {
    // silently skip
  }
}

function buildCandidate(s) {
  const el = document.createElement("div");
  el.className = "candidate";
  const comments = (s.comments || []).map(c =>
    '<div class="comment">' + escapeHtml(c.text) +
    '<div class="meta">' + escapeHtml(c.author) + ' — ' + new Date(c.date).toLocaleDateString("fr-FR") + '</div></div>'
  ).join("");

  el.innerHTML =
    ('<div class="candidate-photo" data-photo-id="' + s.id + '"></div>') +
    '<div>' +
      '<div class="candidate-name">' + escapeHtml(s.name) + '</div>' +
      '<div class="candidate-agency">' + escapeHtml(s.agency || "") + '</div>' +
      '<div class="candidate-links">' +
        (s.cv ? '<a href="' + s.cv + '" target="_blank">CV / fiche</a>' : "") +
        (s.showreel ? '<a href="' + s.showreel + '" target="_blank">Showreel</a>' : "") +
        (s.vimeo ? '<a href="' + s.vimeo + '" target="_blank">Essai (Vimeo)</a>' : "") +
      '</div>' +
      '<div class="comments">' +
        comments +
        '<div class="comment-form">' +
          '<input type="text" class="author" placeholder="Votre nom">' +
          '<textarea placeholder="Votre commentaire..."></textarea>' +
          '<button>Envoyer</button>' +
        '</div>' +
        '<div class="comment-msg"></div>' +
      '</div>' +
    '</div>';

  const btn = el.querySelector(".comment-form button");
  const textarea = el.querySelector(".comment-form textarea");
  const authorInput = el.querySelector(".comment-form .author");
  const msg = el.querySelector(".comment-msg");

  btn.addEventListener("click", async () => {
    const text = textarea.value.trim();
    if (!text) { msg.textContent = "Merci d'écrire un commentaire."; return; }
    btn.disabled = true;
    msg.textContent = "Envoi...";
    try {
      const res = await fetch("/api/client-comment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: s.id, text, author: authorInput.value })
      });
      if (!res.ok) throw new Error();
      msg.textContent = "Commentaire envoyé ✓";
      textarea.value = "";
      load();
    } catch {
      msg.textContent = "Erreur lors de l'envoi.";
    } finally {
      btn.disabled = false;
    }
  });

  const photoPlaceholder = el.querySelector(".candidate-photo[data-photo-id]");
  if (photoPlaceholder) loadPhotoInto(photoPlaceholder, s.id, s.name);

  return el;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

load();
</script>
</body>
</html>
