<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORAGE — Proposition de casting</title>
<style>
  :root {
    --dark: #0d1b2a; --dark2: #0a1420; --green: #1a6b3c; --green-light: #2f9a5b;
    --gray: #8a94a3; --line: rgba(255,255,255,0.12); --card: #12233a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(160deg, var(--dark), var(--dark2)); color: #f4f6f8; min-height: 100vh; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 56px 24px 80px; }
  h1 { text-align: center; font-size: 46px; margin: 0 0 6px; letter-spacing: 1px; font-weight: 800; }
  .subtitle { text-align: center; color: var(--green-light); font-weight: 700; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 40px; }
  .role-group { margin-bottom: 40px; }
  .role-group h2 { font-size: 15px; color: var(--green-light); text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 16px; }
  .candidate {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; margin-bottom: 18px; display: grid; grid-template-columns: 140px 1fr; gap: 22px;
  }
  .candidate-photo { width: 140px; height: 186px; object-fit: cover; border-radius: 8px; background: #0d1826; box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
  .candidate-name { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
  .candidate-agency { color: var(--gray); font-size: 13px; margin-bottom: 12px; }
  .candidate-links { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .candidate-links a {
    color: var(--green-light); text-decoration: none; font-size: 13px; font-weight: 700;
    border: 1px solid var(--green); border-radius: 6px; padding: 6px 12px;
  }
  .candidate-links a:hover { background: var(--green); color: #fff; }
  .comments { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 12px; }
  .comment { font-size: 13px; color: #d7dde3; margin-bottom: 8px; padding-left: 10px; border-left: 2px solid var(--green); }
  .comment .meta { color: var(--gray); font-size: 11px; margin-top: 2px; }
  .comment-form { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .comment-form input[type="text"].author { width: 140px; }
  .comment-form input, .comment-form textarea {
    background: #0d1826; border: 1px solid var(--line); border-radius: 6px; color: #fff;
    padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .comment-form textarea { flex: 1; min-width: 200px; resize: vertical; min-height: 38px; }
  .comment-form button {
    background: var(--green); border: none; color: #fff; padding: 8px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .comment-form button:hover { background: var(--green-light); }
  .comment-msg { font-size: 12px; color: var(--green-light); margin-top: 6px; }
  .empty { text-align: center; color: var(--gray); padding: 60px 0; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ORAGE</h1>
    <div class="subtitle">Proposition de casting — comédiens retenus</div>
    <div id="content"><div class="empty">Chargement...</div></div>
  </div>

<script>
const ROLES_ORDER = ["ALEXANDRE DE CHASTENET", "AUGUSTIN DE CHASTENET", "BIXENTE APARRA", "LÉANDRO APARRA", "LORÉA APARRA", "VANESSA", "JO", "STÉPHANIE CRÉMIEUX", "ROMÉO GARANO", "MIKEL BASAGOITI", "RÉMI", "ESTEBAN AUDIBERT", "MATHIS", "ELIOTT BOVAL"];

async function load() {
  const content = document.getElementById("content");
  try {
    const res = await fetch("/api/client-view?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) {
      let detail = "";
      try { const body = await res.json(); detail = body.error || body.detail || ""; } catch {}
      content.innerHTML = '<div class="empty">Erreur de chargement (' + res.status + ')' + (detail ? " : " + detail : "") + '</div>';
      return;
    }
    const data = await res.json();
    render(data.submissions || []);
  } catch (err) {
    content.innerHTML = '<div class="empty">Erreur de chargement : ' + (err && err.message ? err.message : "inconnue") + '</div>';
  }
}

function render(all) {
  const content = document.getElementById("content");
  content.innerHTML = "";
  if (all.length === 0) {
    content.innerHTML = '<div class="empty">Aucune proposition disponible pour le moment.</div>';
    return;
  }
  ROLES_ORDER.forEach(role => {
    const items = all.filter(s => s.role === role);
    if (items.length === 0) return;
    const group = document.createElement("div");
    group.className = "role-group";
    group.innerHTML = "<h2>" + role + "</h2>";
    items.forEach(s => group.appendChild(buildCandidate(s)));
    content.appendChild(group);
  });
}

async function loadPhotoInto(placeholderEl, id, name) {
  try {
    const res = await fetch("/api/client-photo?id=" + encodeURIComponent(id), { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    if (data.photo) {
      const img = document.createElement("img");
      img.className = "candidate-photo";
      img.src = data.photo;
      img.alt = name;
      placeholderEl.replaceWith(img);
    }
  } catch {
    // silently skip
  }
}

function buildCandidate(s) {
  const el = document.createElement("div");
  el.className = "candidate";
  const comments = (s.comments || []).map(c =>
    '<div class="comment">' + escapeHtml(c.text) +
    '<div class="meta">' + escapeHtml(c.author) + ' — ' + new Date(c.date).toLocaleDateString("fr-FR") + '</div></div>'
  ).join("");

  el.innerHTML =
    ('<div class="candidate-photo" data-photo-id="' + s.id + '"></div>') +
    '<div>' +
      '<div class="candidate-name">' + escapeHtml(s.name) + '</div>' +
      '<div class="candidate-agency">' + escapeHtml(s.agency || "") + '</div>' +
      '<div class="candidate-links">' +
        (s.cv ? '<a href="' + s.cv + '" target="_blank">CV / fiche</a>' : "") +
        (s.showreel ? '<a href="' + s.showreel + '" target="_blank">Showreel</a>' : "") +
        (s.vimeo ? '<a href="' + s.vimeo + '" target="_blank">Essai (Vimeo)</a>' : "") +
      '</div>' +
      '<div class="comments">' +
        comments +
        '<div class="comment-form">' +
          '<input type="text" class="author" placeholder="Votre nom">' +
          '<textarea placeholder="Votre commentaire..."></textarea>' +
          '<button>Envoyer</button>' +
        '</div>' +
        '<div class="comment-msg"></div>' +
      '</div>' +
    '</div>';

  const btn = el.querySelector(".comment-form button");
  const textarea = el.querySelector(".comment-form textarea");
  const authorInput = el.querySelector(".comment-form .author");
  const msg = el.querySelector(".comment-msg");

  btn.addEventListener("click", async () => {
    const text = textarea.value.trim();
    if (!text) { msg.textContent = "Merci d'écrire un commentaire."; return; }
    btn.disabled = true;
    msg.textContent = "Envoi...";
    try {
      const res = await fetch("/api/client-comment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: s.id, text, author: authorInput.value })
      });
      if (!res.ok) throw new Error();
      msg.textContent = "Commentaire envoyé ✓";
      textarea.value = "";
      load();
    } catch {
      msg.textContent = "Erreur lors de l'envoi.";
    } finally {
      btn.disabled = false;
    }
  });

  const photoPlaceholder = el.querySelector(".candidate-photo[data-photo-id]");
  if (photoPlaceholder) loadPhotoInto(photoPlaceholder, s.id, s.name);

  return el;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

load();
</script>
</body>
</html>
